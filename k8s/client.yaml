apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: fullstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: ACR_LOGIN_SERVER/client:IMAGE_TAG
          ports:
            - containerPort: 4173
          env:
            - name: VITE_SERVER_URL
              value: "http://server:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 4173
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 4173
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: fullstack
spec:
  selector:
    app: client
  ports:
    - port: 4173
      targetPort: 4173
