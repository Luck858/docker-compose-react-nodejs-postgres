apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: fullstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: server
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      initContainers:
        - name: migrate
          image: DOCKERHUB_USERNAME/server:IMAGE_TAG
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
      containers:
        - name: server
          image: DOCKERHUB_USERNAME/server:IMAGE_TAG
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: PORT
              value: "8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: fullstack
spec:
  selector:
    app: server
  ports:
    - port: 8000
      targetPort: 8000
