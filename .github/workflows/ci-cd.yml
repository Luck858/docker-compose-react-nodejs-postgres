name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.ACR_LOGIN_SERVER }}/server:${{ env.IMAGE_TAG }}

      - name: Build & push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.ACR_LOGIN_SERVER }}/client:${{ env.IMAGE_TAG }}
          build-args: |
            VITE_SERVER_URL=${{ secrets.VITE_SERVER_URL }}

  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: fullstack-app-rg
          cluster-name: fullstack-app-aks
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Substitute image tags in manifests
        run: |
          sed -i "s|ACR_LOGIN_SERVER|${{ env.ACR_LOGIN_SERVER }}|g" k8s/server.yaml k8s/client.yaml
          sed -i "s|IMAGE_TAG|${{ env.IMAGE_TAG }}|g" k8s/server.yaml k8s/client.yaml

      - name: Apply namespace and secrets
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl create secret generic postgres-secret \
            --namespace=fullstack \
            --from-literal=POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            --from-literal=DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply infrastructure manifests
        run: kubectl apply -f k8s/postgres-pvc.yaml -f k8s/postgres.yaml

      - name: Wait for PostgreSQL ready
        run: kubectl rollout status deployment/postgres -n fullstack --timeout=120s

      - name: Deploy server and client
        run: kubectl apply -f k8s/server.yaml -f k8s/client.yaml -f k8s/ingress.yaml

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/server -n fullstack --timeout=180s
          kubectl rollout status deployment/client -n fullstack --timeout=180s
